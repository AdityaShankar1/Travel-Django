{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Travel Project</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light p-3">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="{% url 'home' %}">TravelApp</a>
            <div class="navbar-nav me-auto">
                <a class="nav-link" href="{% url 'about_us' %}">About Us</a>
            </div>
            <div class="navbar-nav">
                <a class="nav-link" href="{% url 'home' %}">Home</a>
                <a class="nav-link" href="{% url 'weather_dashboard' %}">Weather Alerts</a>
                <a class="nav-link" href="{% url 'blog_list' %}">Blogs</a>
                {% if user.is_authenticated %}
                <a class="nav-link" href="{% url 'my_bookings' %}">My Bookings</a>
                <a class="nav-link" href="{% url 'logout' %}">Logout</a>
                {% else %}
                <a class="nav-link" href="{% url 'login' %}">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <main class="container mt-4">
        {% block content %}{% endblock %}
    </main>
    <footer class="container mt-5 py-4 border-top">
        <div class="text-center text-muted small">
            <a href="https://github.com/AdityaShankar1/Travel-Django" target="_blank" rel="noopener noreferrer"
                class="text-decoration-none text-muted">View source code (AGPL)</a>
        </div>
    </footer>
</body>

</html>
